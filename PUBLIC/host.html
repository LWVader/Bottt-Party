<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Word Bottts - Host Screen</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div id="launcher" class="text-center">
        <h1 class="text-5xl font-extrabold mb-6 text-indigo-400">📝 Word Bottts</h1>
        <p class="text-xl text-slate-400 mb-8">Unscramble the letters to name that random avatar style!</p>
        <button id="createBtn" class="bg-indigo-600 hover:bg-indigo-500 px-8 py-4 rounded-xl text-2xl font-bold transition">
            Start New Game Session
        </button>
    </div>

    <div id="lobby" class="hidden text-center w-full max-w-2xl">
        <h2 class="text-2xl text-slate-400 tracking-wider font-semibold">ROOM CODE</h2>
        <div id="roomDisplay" class="text-7xl font-black text-indigo-400 tracking-widest my-4 bg-slate-800 py-4 px-8 rounded-2xl shadow-lg border border-slate-700 inline-block">----</div>
        <div>
            <button id="startBtn" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-xl font-bold transition text-lg shadow-lg">Launch Game 🚀</button>
        </div>
        <div class="mt-8">
            <h3 class="text-2xl font-bold mb-4">Players Joined:</h3>
            <div id="playerList" class="grid grid-cols-2 gap-4 text-xl"></div>
        </div>
    </div>

    <div id="hostGameScreen" class="hidden text-center space-y-6 max-w-2xl">
        <h1 class="text-4xl font-black text-indigo-400">Who or What is this Avatar? 🧐</h1>
        <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl flex flex-col items-center space-y-6">
            <img id="puzzleImg" src="" class="w-64 h-64 object-contain animate-pulse" alt="Puzzle Blueprint">
            <p id="clueText" class="text-xl italic text-slate-300 bg-slate-900/50 px-6 py-3 rounded-xl border border-slate-700/50"></p>
        </div>
        
        <div class="pt-2">
            <button id="forceEndBtn" class="bg-amber-600 hover:bg-amber-500 text-white px-6 py-3 rounded-xl font-bold transition shadow-lg text-md">
                Force End Round Early ⏱️
            </button>
        </div>
    </div>

    <div id="hostResultsScreen" class="hidden text-center space-y-6 w-full max-w-xl">
        <h1 class="text-4xl font-black text-emerald-400">Round Over! 🏆</h1>
        <p class="text-xl">The secret word was: <span id="correctWordDisplay" class="font-bold text-indigo-300 tracking-widest bg-slate-800 px-4 py-1 rounded-lg border border-slate-700">---</span></p>
        <div id="resultsBox" class="bg-slate-800 p-6 rounded-2xl border border-slate-700 space-y-4 shadow-xl"></div>
        <button id="nextRoundBtn" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-3 rounded-xl font-bold text-lg transition">Play Another Round 🔄</button>
    </div>

    <script>
        const launcher = document.getElementById('launcher');
        const lobby = document.getElementById('lobby');
        const hostGameScreen = document.getElementById('hostGameScreen');
        const hostResultsScreen = document.getElementById('hostResultsScreen');
        
        const createBtn = document.getElementById('createBtn');
        const startBtn = document.getElementById('startBtn');
        const forceEndBtn = document.getElementById('forceEndBtn');
        const nextRoundBtn = document.getElementById('nextRoundBtn');
        const roomDisplay = document.getElementById('roomDisplay');
        const playerList = document.getElementById('playerList');
        const puzzleImg = document.getElementById('puzzleImg');
        const clueText = document.getElementById('clueText');
        const correctWordDisplay = document.getElementById('correctWordDisplay');
        const resultsBox = document.getElementById('resultsBox');

        const socket = io(); 

        createBtn.addEventListener('click', () => socket.emit('create-room'));
        
        socket.on('room-created', (roomCode) => {
            launcher.classList.add('hidden'); lobby.classList.remove('hidden');
            roomDisplay.innerText = roomCode;
        });

        socket.on('update-player-list', (nicknames) => {
            playerList.innerHTML = ''; 
            nicknames.forEach(name => {
                playerList.innerHTML += `<div class="bg-slate-800 border border-slate-700 py-3 px-6 rounded-xl font-medium">${name}</div>`;
            });
        });

        startBtn.addEventListener('click', () => {
            socket.emit('start-game', { roomCode: roomDisplay.innerText.trim() });
        });

        // NEW: Allow the host to skip remaining player guess timers manually
        forceEndBtn.addEventListener('click', () => {
            socket.emit('force-end-round', { roomCode: roomDisplay.innerText.trim() });
        });

        socket.on('host-display-puzzle', ({ avatarUrl, clue }) => {
            lobby.classList.add('hidden'); hostResultsScreen.classList.add('hidden');
            hostGameScreen.classList.remove('hidden');
            puzzleImg.src = avatarUrl;
            clueText.innerText = `Hint: ${clue}`;
        });

        socket.on('reveal-results', ({ scoreboard, correctWord }) => {
            hostGameScreen.classList.add('hidden');
            hostResultsScreen.classList.remove('hidden');
            correctWordDisplay.innerText = correctWord;
            resultsBox.innerHTML = '';

            scoreboard.forEach((p, idx) => {
                resultsBox.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-900/50 p-4 rounded-xl border border-slate-700/50 font-bold text-xl">
                        <span>#${idx+1} ${p.nickname}</span>
                        <span class="text-emerald-400">${p.score} pts</span>
                    </div>`;
            });
        });

        nextRoundBtn.addEventListener('click', () => {
            socket.emit('host-restart-round', { roomCode: roomDisplay.innerText.trim() });
        });

        socket.on('trigger-next-round', ({ roomCode }) => {
            socket.emit('start-game', { roomCode });
        });
    </script>
</body>
</html>
