<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Bottts - Controller</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div id="joinForm" class="w-full max-w-sm space-y-4">
        <h2 class="text-3xl font-black text-center text-indigo-400 mb-6">Join Word Bottts</h2>
        <input id="roomInput" type="text" maxlength="4" placeholder="ROOM CODE" class="w-full uppercase bg-slate-800 border border-slate-700 p-3 rounded-xl text-center font-bold tracking-widest text-xl focus:outline-none focus:border-indigo-500">
        <input id="nickInput" type="text" placeholder="YOUR NICKNAME" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl font-medium text-center uppercase tracking-wider focus:outline-none focus:border-indigo-500">
        <button id="joinBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 p-3 rounded-xl font-bold text-lg transition shadow-lg">Enter Lobby</button>
    </div>

    <div id="waitingScreen" class="hidden text-center space-y-4 w-full max-w-sm">
        <div class="inline-block p-4 rounded-full bg-indigo-600/20 text-indigo-400 text-4xl mb-2 animate-bounce">⏳</div>
        <h2 class="text-2xl font-bold">Connected!</h2>
        <p class="text-slate-400">Look up at the Host TV Screen. Game will start soon...</p>
    </div>

    <div id="playerPuzzleScreen" class="hidden w-full max-w-sm space-y-6 text-center">
        <h2 class="text-2xl font-black text-indigo-400">Unscramble & Guess!</h2>
        
        <div id="letterBank" class="flex justify-center flex-wrap gap-2 py-4 px-2 bg-slate-800/40 border border-slate-700/40 rounded-2xl min-h-[70px] items-center"></div>
        
        <input id="guessInput" type="text" placeholder="TYPE DECODED ANSWER HERE" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-lg font-bold tracking-widest text-center uppercase focus:outline-none focus:border-indigo-500">
        <button id="submitGuessBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 p-3 rounded-xl font-bold text-lg transition shadow-lg">Submit Guess 🎯</button>
    </div>

    <div id="controllerDashboard" class="hidden w-full max-w-sm mt-8 border-t border-slate-800 pt-6">
        <div class="bg-slate-800/60 border border-slate-700/60 rounded-2xl p-4 space-y-3">
            <div class="flex justify-between items-center border-b border-slate-700/50 pb-2">
                <h3 class="text-md font-bold tracking-wider text-slate-400 uppercase font-semibold">Standings</h3>
                <span class="text-xs bg-indigo-500/20 text-indigo-300 font-bold px-2 py-0.5 rounded-full border border-indigo-500/20">Live Roster</span>
            </div>
            <div id="playerScoreboardList" class="space-y-2 max-h-40 overflow-y-auto text-sm">
                </div>
        </div>
        <div class="text-center mt-4">
            <button id="leaveRoomBtn" class="text-sm font-semibold text-rose-400 hover:text-rose-300 underline transition">
                Leave Game Session 👋
            </button>
        </div>
    </div>

    <script>
        const joinForm = document.getElementById('joinForm');
        const waitingScreen = document.getElementById('waitingScreen');
        const playerPuzzleScreen = document.getElementById('playerPuzzleScreen');
        const controllerDashboard = document.getElementById('controllerDashboard');
        const playerScoreboardList = document.getElementById('playerScoreboardList');
        
        const joinBtn = document.getElementById('joinBtn');
        const leaveRoomBtn = document.getElementById('leaveRoomBtn');
        const roomInput = document.getElementById('roomInput');
        const nickInput = document.getElementById('nickInput');
        
        const letterBank = document.getElementById('letterBank');
        const guessInput = document.getElementById('guessInput');
        const submitGuessBtn = document.getElementById('submitGuessBtn');

        const socket = io();

        joinBtn.addEventListener('click', () => {
            const roomCode = roomInput.value.trim().toUpperCase();
            const nickname = nickInput.value.trim().toUpperCase();
            if (roomCode && nickname) socket.emit('join-room', { roomCode, nickname });
        });

        // NEW: Clean manual leave routine
        leaveRoomBtn.addEventListener('click', () => {
            if(confirm("Are you sure you want to leave this game room? Your score data will be wiped.")) {
                window.location.reload(); // Simple reload clears socket identity and tables
            }
        });

        socket.on('player-joined-success', () => {
            joinForm.classList.add('hidden'); 
            waitingScreen.remove('hidden'); // Fix string arg targeting safety
            waitingScreen.classList.remove('hidden');
            controllerDashboard.classList.remove('hidden');
        });

        socket.on('player-start-puzzle', ({ scrambledLetters }) => {
            waitingScreen.classList.add('hidden');
            playerPuzzleScreen.classList.remove('hidden');
            
            guessInput.value = '';
            guessInput.disabled = false;
            submitGuessBtn.disabled = false;
            submitGuessBtn.innerText = "Submit Guess 🎯";
            submitGuessBtn.className = "w-full bg-emerald-600 hover:bg-emerald-500 p-3 rounded-xl font-bold text-lg transition shadow-lg";

            letterBank.innerHTML = '';
            scrambledLetters.split('').forEach(char => {
                letterBank.innerHTML += `<span class="bg-indigo-600/20 text-indigo-300 font-black border border-indigo-500/30 w-10 h-10 flex items-center justify-center text-xl rounded-lg shadow">${char}</span>`;
            });
        });

        submitGuessBtn.addEventListener('click', () => {
            const answer = guessInput.value.trim().toUpperCase();
            if (!answer) return;

            socket.emit('submit-guess', { guess: answer });
            
            guessInput.disabled = true;
            submitGuessBtn.disabled = true;
            submitGuessBtn.innerText = "Answer Locked In! 🔒";
            submitGuessBtn.className = "w-full bg-slate-700 p-3 rounded-xl font-bold text-lg cursor-not-allowed text-slate-400";
        });

        socket.on('guess-result', ({ feedback }) => {
            letterBank.innerHTML = `<p class="text-xl font-black text-center w-full tracking-wider">${feedback}</p>`;
        });

        // NEW: Update live score data listings inside the player interface dashboard
        socket.on('update-player-scores', ({ standings }) => {
            playerScoreboardList.innerHTML = '';
            standings.forEach(p => {
                playerScoreboardList.innerHTML += `
                    <div class="flex justify-between items-center text-slate-300">
                        <span class="font-medium">${p.nickname}</span>
                        <span class="font-bold text-indigo-400">${p.score} pts</span>
                    </div>`;
            });
        });

        socket.on('reset-player-controller', () => {
            playerPuzzleScreen.classList.add('hidden');
            waitingScreen.classList.remove('hidden');
        });

        socket.on('error-message', (msg) => alert(msg));
    </script>
</body>
</html>
